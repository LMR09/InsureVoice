<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — InsureVoice</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 80% 50%, rgba(245,158,11,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.05) 0%, transparent 50%);
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .auth-logo { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:900; text-align:center; margin-bottom:8px; }
    .auth-logo span { color: var(--amber); }
    .auth-tagline { text-align:center; color:var(--slate); font-size:0.88rem; margin-bottom:32px; }
    .auth-title { font-size:1.5rem; text-align:center; margin-bottom:24px; font-family:'DM Sans',sans-serif; font-weight:700; }
    .divider-or { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--slate); font-size:0.8rem; }
    .divider-or::before,.divider-or::after { content:''; flex:1; height:1px; background:var(--border); }
    .btn-google {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:11px;
      background:rgba(255,255,255,0.05); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); color:var(--white);
      font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600;
      cursor:pointer; transition:var(--transition);
    }
    .btn-google:hover { border-color:#4285F4; background:rgba(66,133,244,0.08); }
    .btn-google img { width:18px; height:18px; }
    .auth-footer { text-align:center; margin-top:24px; color:var(--slate); font-size:0.88rem; }
    .forgot-link { display:block; text-align:right; font-size:0.82rem; margin-top:6px; color:var(--slate); }
    .forgot-link:hover { color:var(--amber); }
    .password-wrapper { position:relative; }
    .password-toggle {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--slate); cursor:pointer; font-size:1rem; padding:4px;
    }
    #alertBox { min-height:20px; }
    /* Forgot password modal */
    .modal { display:none; }
    .modal.open { display:block; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Insure<span>Voice</span></div>
    <div class="auth-tagline">Welcome back — pick up where you left off</div>
    <div class="auth-title">Sign In</div>

    <!-- Google Sign In -->
    <button class="btn-google" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Continue with Google
    </button>

    <div class="divider-or">or</div>

    <!-- Alert Box -->
    <div id="alertBox"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control"
               placeholder="you@example.com" autocomplete="email" />
        <div class="form-error" id="emailError">Please enter a valid email.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control"
                 placeholder="Your password" autocomplete="current-password" />
          <button type="button" class="password-toggle" id="togglePwd">👁</button>
        </div>
        <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
        <div class="form-error" id="pwdError">Password is required.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>

  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal" style="display:none;">
  <div class="modal">
    <h3 style="margin-bottom:8px;">Reset Password</h3>
    <p style="color:var(--slate);font-size:0.88rem;margin-bottom:20px;">
      Enter your email and we'll send a reset link.
    </p>
    <div id="resetAlert"></div>
    <div class="form-group">
      <label class="form-label" for="resetEmail">Email Address</label>
      <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" />
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" id="sendResetBtn">Send Reset Link</button>
      <button class="btn btn-outline" id="closeModal">Cancel</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  // ── Password Toggle ──
  document.getElementById('togglePwd').addEventListener('click', () => {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
  });

  // ── Login Form Submit ──
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;
    let ok = true;

    // Validate email
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const emailErr = document.getElementById('emailError');
    if (!emailRe.test(email)) { emailErr.classList.add('show'); ok = false; }
    else emailErr.classList.remove('show');

    // Validate password
    const pwdErr = document.getElementById('pwdError');
    if (!pwd) { pwdErr.classList.add('show'); ok = false; }
    else pwdErr.classList.remove('show');

    if (!ok) return;

    const btn = document.getElementById('loginBtn');
    setButtonLoading(btn, true);

    try {
      await auth.signInWithEmailAndPassword(email, pwd);

      // Check for redirect param
      const params  = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'index.html';
      showAlert('alertBox', 'success', '✅ Signed in! Redirecting…');
      setTimeout(() => { window.location.href = redirect; }, 1000);

    } catch (err) {
      const msgs = {
        'auth/user-not-found':   'No account found with this email.',
        'auth/wrong-password':   'Incorrect password. Please try again.',
        'auth/invalid-email':    'Invalid email address.',
        'auth/too-many-requests':'Too many failed attempts. Please try later.',
        'auth/user-disabled':    'This account has been disabled.',
      };
      showAlert('alertBox', 'error', '❌ ' + (msgs[err.code] || err.message));
      setButtonLoading(btn, false, 'Sign In');
    }
  });

  // ── Google Sign In ──
  document.getElementById('googleLogin').addEventListener('click', async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const result = await auth.signInWithPopup(provider);
      const user   = result.user;
      // Upsert user doc
      await db.collection('users').doc(user.uid).set({
        uid:   user.uid,
        name:  user.displayName || '',
        email: user.email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        reviewCount: 0,
      }, { merge: true });
      window.location.href = 'index.html';
    } catch (err) {
      if (err.code === 'auth/account-exists-with-different-credential') {
        showAlert('alertBox', 'error',
          '❌ An account already exists with this email using a password. Please sign in with your email and password instead.');
      } else {
        showAlert('alertBox', 'error', '❌ Google sign-in failed: ' + err.message);
      }
    }
  });

  // ── Forgot Password Modal ──
  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('forgotModal').style.display = 'flex';
  });
  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('forgotModal').style.display = 'none';
  });
  document.getElementById('sendResetBtn').addEventListener('click', async () => {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) {
      showAlert('resetAlert', 'error', 'Please enter your email.');
      return;
    }
    try {
      await auth.sendPasswordResetEmail(email);
      showAlert('resetAlert', 'success', '✅ Reset link sent! Check your inbox.');
      setTimeout(() => {
        document.getElementById('forgotModal').style.display = 'none';
      }, 2500);
    } catch (err) {
      showAlert('resetAlert', 'error', '❌ ' + err.message);
    }
  });

  // ── Redirect if already logged in ──
  auth.onAuthStateChanged((user) => {
    if (user) {
      const params  = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'index.html';
      window.location.href = redirect;
    }
  });
</script>
</body>
</html>
