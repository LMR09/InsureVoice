<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — InsureVoice</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-page { padding: 40px 0 80px; }
    .profile-layout { display:grid; grid-template-columns:300px 1fr; gap:28px; align-items:start; }
    .profile-sidebar { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px 24px; text-align:center; position:sticky; top:90px; }
    .profile-avatar { width:80px; height:80px; border-radius:50%; background:var(--amber); color:var(--navy); font-weight:900; font-size:2rem; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-family:'Playfair Display',serif; }
    .profile-name { font-family:'Playfair Display',serif; font-size:1.25rem; margin-bottom:4px; }
    .profile-email { color:var(--slate); font-size:0.85rem; margin-bottom:20px; }
    .profile-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
    .profile-stat { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 10px; text-align:center; }
    .profile-stat-num { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--amber); }
    .profile-stat-label { font-size:0.72rem; color:var(--slate); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
    .tab-bar { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:4px; margin-bottom:24px; }
    .tab-btn { flex:1; padding:10px 16px; border:none; background:transparent; color:var(--slate); font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:600; cursor:pointer; border-radius:6px; transition:var(--transition); }
    .tab-btn.active { background:var(--card); color:var(--white); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .edit-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; }
    @media(max-width:768px){ .profile-layout{grid-template-columns:1fr} .profile-sidebar{position:static} }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Insure<span>Voice</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="review.html">Write Review</a></li>
    <li><a href="profile.html" class="active">My Profile</a></li>
  </ul>
  <div class="nav-actions" id="navActions"></div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="container profile-page">
  <div id="profileContent">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <h3>Loading profile…</h3>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
requireAuth().then(async (user) => {

  // FIX: Removed .orderBy('timestamp','desc') — it requires a Firestore
  // composite index that hasn't been created yet, causing the query to fail
  // silently and profile to stay on "Loading...".
  // We fetch all user reviews without orderBy, then sort in JavaScript instead.
  const revSnap = await db.collection('reviews')
    .where('userId', '==', user.uid)
    .get();

  // Sort by timestamp descending in JavaScript (no index needed)
  const userReviews = revSnap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

  const profile = await getUserProfile(user.uid);
  const initial = (user.displayName || user.email || 'U')[0].toUpperCase();

  document.getElementById('profileContent').innerHTML = `
  <div class="profile-layout">
    <div class="profile-sidebar">
      <div class="profile-avatar">${initial}</div>
      <div class="profile-name">${user.displayName || 'InsureVoice User'}</div>
      <div class="profile-email">${user.email}</div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-num">${userReviews.length}</div>
          <div class="profile-stat-label">Reviews</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${userReviews.filter(r => r.verifiedStatus).length}</div>
          <div class="profile-stat-label">Verified</div>
        </div>
      </div>
      <div style="text-align:left;border-top:1px solid var(--border);padding-top:16px;margin-top:4px;">
        <div style="font-size:0.78rem;color:var(--slate);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Member Since</div>
        <div style="font-size:0.88rem;">${profile?.createdAt ? formatDate(profile.createdAt) : 'N/A'}</div>
      </div>
      <div style="margin-top:16px;">
        <a href="review.html" class="btn btn-primary btn-full">+ Write New Review</a>
      </div>
    </div>

    <div class="profile-main">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="myReviews">My Reviews (${userReviews.length})</button>
        <button class="tab-btn" data-tab="settings">Account Settings</button>
      </div>

      <div class="tab-panel active" id="tab-myReviews">
        ${userReviews.length === 0
          ? `<div class="empty-state">
               <div class="empty-icon">📝</div>
               <h3>No reviews yet</h3>
               <p style="margin-bottom:20px;">Share your first insurance experience!</p>
               <a href="review.html" class="btn btn-primary">Write a Review</a>
             </div>`
          : userReviews.map(r => `
            <div class="review-card" style="margin-bottom:16px;">
              <div class="review-card-header">
                <div>
                  <div class="review-company">${r.insuranceCompany || '—'}</div>
                  <div class="review-title">${r.reviewTitle || ''}</div>
                </div>
                <div class="stars-display">${starsHTML(r.rating || 0)}</div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
                ${sentimentBadge(r.sentiment)}
                ${claimBadge(r.claimStatus)}
                ${verifiedBadge(r.verifiedStatus)}
                <span style="font-size:0.75rem;color:var(--slate);background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:3px 10px;border-radius:20px;">
                  📋 ${r.policyType || '—'}
                </span>
              </div>
              <p class="review-text">${r.reviewText || ''}</p>
              <div class="review-footer">
                <span style="font-size:0.8rem;color:var(--slate);">${relativeTime(r.timestamp)}</span>
                <button class="btn btn-danger btn-sm delete-btn" data-id="${r.id}">🗑 Delete</button>
              </div>
            </div>`).join('')
        }
      </div>

      <div class="tab-panel" id="tab-settings">
        <div class="edit-card">
          <h3 style="font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:20px;">Update Display Name</h3>
          <div id="settingsAlert"></div>
          <div class="form-group">
            <label class="form-label">Display Name</label>
            <input type="text" id="newName" class="form-control" value="${user.displayName || ''}" placeholder="Your name" />
          </div>
          <button class="btn btn-primary" id="saveNameBtn">Save Changes</button>
        </div>
        <div class="edit-card" style="margin-top:20px;border-color:rgba(239,68,68,0.2);">
          <h3 style="font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:8px;color:var(--danger);">Sign Out</h3>
          <p style="color:var(--slate);font-size:0.88rem;margin-bottom:16px;">Sign out of InsureVoice on this device.</p>
          <button class="btn btn-danger" id="signOutBtn">Sign Out</button>
        </div>
      </div>
    </div>
  </div>`;

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    });
  });

  // Save name — uses addEventListener (not inline onclick)
  document.getElementById('saveNameBtn').addEventListener('click', async () => {
    const newName = document.getElementById('newName').value.trim();
    if (!newName) { showAlert('settingsAlert', 'error', 'Name cannot be empty.'); return; }
    try {
      await user.updateProfile({ displayName: newName });
      await db.collection('users').doc(user.uid).set({ name: newName }, { merge: true });
      showAlert('settingsAlert', 'success', '✅ Name updated successfully!');
    } catch (e) { showAlert('settingsAlert', 'error', '❌ ' + e.message); }
  });

  // Sign out button — uses addEventListener (not inline onclick)
  document.getElementById('signOutBtn').addEventListener('click', () => {
    logoutUser();
  });

  // Delete review buttons — uses event delegation (not inline onclick)
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    if (!confirm('Delete this review? This cannot be undone.')) return;
    try {
      await db.collection('reviews').doc(id).delete();
      await db.collection('users').doc(user.uid).set({
        reviewCount: firebase.firestore.FieldValue.increment(-1)
      }, { merge: true });
      location.reload();
    } catch (e) { alert('Could not delete: ' + e.message); }
  });

}).catch((err) => {
  console.error('Profile load error:', err);
  document.getElementById('profileContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <h3>Could not load profile</h3>
      <p>Please <a href="login.html">sign in again</a>.</p>
    </div>`;
});
</script>
</body>
</html>
